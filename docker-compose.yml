services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kakeibo
      POSTGRES_USER: kakeibo
      POSTGRES_PASSWORD: kakeibo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kakeibo -d kakeibo"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://kakeibo:kakeibo@postgres:5432/kakeibo?schema=public
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start"

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql://kakeibo:kakeibo@postgres:5432/kakeibo?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run worker"

volumes:
  postgres-data:
